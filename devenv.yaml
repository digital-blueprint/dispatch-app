# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  nixpkgs:
    # We need Node.js >=24.15.0 for the npm dependency engine constraints.
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  shared:
    url: github:digital-blueprint/shared
    flake: false

  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
imports:
  - shared/common
  - shared/dbp-app
  - shared/playwright
